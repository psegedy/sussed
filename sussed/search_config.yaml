# sussed Search Configuration 🏠
#
# This file defines what you're looking for in an apartment.
# Customize it and run: sussed hunt --config search_config.yaml
#
# Pro tips:
# - 1 Kč price = "Price on request" - we handle this specially!
# - max_price_per_m2 is often better than max_price for finding deals
# - The agent will explain its scoring in the results
#

name: Brno 2+kk/3+kk new-build hunt
description: Looking for a 2+kk or 3+kk new-build / well-kept apartment in Brno with parking, under 10M
criteria:
  city: Brno
  apartment_types:
  - 2+kk
  - 2+1
  - 3+kk
  property_type: apartment
  listing_type: sale
  max_price: 10000000
  max_price_per_m2: 160000
  min_area_m2: 45.0
  avoid_ground_floor: false
  avoid_top_floor: false
  require_parking: true
  require_balcony: false
  require_cellar: false
  require_elevator: true
  reject_panel_building: true
  reject_ground_floor: false
  min_photos: 2
  require_floor_plan: false
  # Auto-reject listings containing these keywords in description (case-insensitive)
  # exclude_description_keywords: "kalevala"
  max_listing_age: 14
scoring:
  bonus_new_building: 300
  bonus_reconstruction: 100
  bonus_very_good_condition: 88
  penalty_no_parking: -200
  penalty_panel: -100
  # Extra penalty keywords for descriptions (merged with built-in sketchy list)
  # penalize_description_keywords:
  #   dražba: -80
  #   exekuce: -100
  # Extra bonus keywords for descriptions (merged with built-in good list)
  # bonus_description_keywords:
  #   výhled na park: 30
  #   garáž v ceně: 40
output:
  mode: best
  limit: 20
  include_analysis: true
  include_description: false
  format: table
agent:
  max_listings_to_process: 1000
  fetch_descriptions: true
  enrich_top_n: 500
  skip_already_scored: false
  treat_1kc_as_poa: true
  poa_evaluation_mode: description_only
  auto_scrape: false
  scrape_max_pages: 20
notes_for_agent: I prefer quiet neighborhoods, ideally close to a park or green space.
  I work from home so natural light is important. Don't mind an older building if
  it's been recently renovated.
preferred_districts:
- Žabovřesky
- Veveří
- Sadová
- Královo Pole
- Černá Pole
- Staré Brno
- Medlánky
- Líšeň
avoid_districts:
- Cejl
- Bystrc
- Žebětín
- Kohoutovice
