# sussed simple example config 🧪
#
# A minimal SearchConfig for quick smoke testing of `sussed hunt`.
# Copy + edit for your own search, or use search_config.yaml for a richer example.
#
# Usage:
#   uv run sussed hunt --config simple_config.yaml
#
# Set ANTHROPIC_API_KEY or OPENAI_API_KEY to enable the optional LLM pass
# (use_llm + llm_analyze_top_n). Without keys, `hunt` still runs the
# deterministic heuristic scoring on every listing.

name: Simple Test Hunt
description: Testing the hunt with LLM analysis

criteria:
  city: Brno
  property_type: apartment
  listing_type: sale
  min_photos: 1

output:
  mode: best
  limit: 5
  include_analysis: true
  format: table

runner:
  max_listings_to_process: 20
  fetch_descriptions: true
  skip_already_scored: false
  use_llm: true
  llm_provider: anthropic
  llm_analyze_top_n: 3
